<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronos Stock Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --text:     #e8e8f0;
    --muted:    #555570;
    --buy:      #00e5a0;
    --sell:     #ff4d6d;
    --hold:     #f5a623;
    --accent:   #7b61ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    padding: 36px 40px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.7;
  }

  .meta b { color: var(--text); }

  .summary-bar {
    display: flex;
    gap: 0;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
  }

  .sum-item {
    padding: 18px 32px 18px 0;
    margin-right: 32px;
    border-right: 1px solid var(--border);
  }
  .sum-item:last-child { border-right: none; }

  .sum-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
  .sum-value { font-size: 26px; font-weight: 700; }
  .sum-value.buy  { color: var(--buy); }
  .sum-value.sell { color: var(--sell); }
  .sum-value.hold { color: var(--hold); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    margin: 0;
  }

  .card {
    background: var(--surface);
    padding: 22px 24px 18px;
    transition: background 0.15s;
    cursor: default;
  }
  .card:hover { background: #15151f; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .ticker {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.08em;
  }
  .badge.BUY  { background: rgba(0,229,160,0.12); color: var(--buy);  border: 1px solid rgba(0,229,160,0.25); }
  .badge.SELL { background: rgba(255,77,109,0.12); color: var(--sell); border: 1px solid rgba(255,77,109,0.25); }
  .badge.HOLD { background: rgba(245,166,35,0.12); color: var(--hold); border: 1px solid rgba(245,166,35,0.25); }

  .prices {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    align-items: baseline;
  }

  .price-now {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
  }

  .price-pred {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--muted);
  }
  .price-pred b { color: var(--text); }

  .change {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    margin-left: auto;
  }
  .change.pos { color: var(--buy); }
  .change.neg { color: var(--sell); }
  .change.neu { color: var(--hold); }

  .sparkline-wrap {
    height: 44px;
    margin-bottom: 10px;
  }

  canvas.spark { width: 100%; height: 44px; display: block; }

  .range-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .range-row span b { color: var(--text); }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 60px 40px;
    color: var(--sell);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .refresh-btn {
    display: inline-block;
    margin: 24px auto 0;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: rgba(123,97,255,0.1); }

  .next-update {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading predictions...</span>
  </div>
</div>

<script>
const DATA_URL = 'data.json';

function drawSparkline(canvas, histData, predData) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth * window.devicePixelRatio;
  const H = canvas.offsetHeight * window.devicePixelRatio;
  canvas.width  = W;
  canvas.height = H;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const cw = canvas.offsetWidth;
  const ch = canvas.offsetHeight;

  const all  = [...histData, ...predData];
  const minV = Math.min(...all);
  const maxV = Math.max(...all);
  const rng  = maxV - minV || 1;
  const pad  = 4;

  const toX = (i, total) => pad + (i / (total - 1)) * (cw - pad * 2);
  const toY = (v) => pad + (1 - (v - minV) / rng) * (ch - pad * 2);

  // History line
  ctx.beginPath();
  histData.forEach((v, i) => {
    i === 0 ? ctx.moveTo(toX(i, histData.length + predData.length), toY(v))
            : ctx.lineTo(toX(i, histData.length + predData.length), toY(v));
  });
  ctx.strokeStyle = 'rgba(180,180,210,0.5)';
  ctx.lineWidth   = 1.2;
  ctx.stroke();

  // Pred line
  const predColor = predData[predData.length-1] >= histData[histData.length-1]
    ? '#00e5a0' : '#ff4d6d';

  ctx.beginPath();
  predData.forEach((v, i) => {
    const xi = histData.length + i;
    i === 0
      ? ctx.moveTo(toX(histData.length - 1, histData.length + predData.length), toY(histData[histData.length-1]))
      : null;
    ctx.lineTo(toX(xi, histData.length + predData.length), toY(v));
  });
  ctx.strokeStyle = predColor;
  ctx.lineWidth   = 1.8;
  ctx.stroke();

  // Divider
  const divX = toX(histData.length - 1, histData.length + predData.length);
  ctx.beginPath();
  ctx.moveTo(divX, 0);
  ctx.lineTo(divX, ch);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([3, 3]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function signalClass(s) {
  if (s === 'BUY')  return 'pos';
  if (s === 'SELL') return 'neg';
  return 'neu';
}

function renderDashboard(data) {
  const buy  = data.stocks.filter(s => s.signal === 'BUY').length;
  const sell = data.stocks.filter(s => s.signal === 'SELL').length;
  const hold = data.stocks.filter(s => s.signal === 'HOLD').length;

  const cards = data.stocks.map(s => {
    const chgSign = s.change_pct >= 0 ? '+' : '';
    return `
    <div class="card">
      <div class="card-top">
        <div class="ticker">${s.ticker}</div>
        <div class="badge ${s.signal}">${s.signal}</div>
      </div>
      <div class="prices">
        <div class="price-now">$${s.current.toFixed(2)}</div>
        <div class="price-pred">→ <b>$${s.predicted.toFixed(2)}</b></div>
        <div class="change ${signalClass(s.signal)}">${chgSign}${s.change_pct.toFixed(2)}%</div>
      </div>
      <div class="sparkline-wrap">
        <canvas class="spark" id="spark-${s.ticker}" height="44"></canvas>
      </div>
      <div class="range-row">
        <span>預測低: <b>$${s.pred_low}</b></span>
        <span>預測高: <b>$${s.pred_high}</b></span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <header>
      <div>
        <div class="logo">KRONOS <span>DASHBOARD</span></div>
      </div>
      <div class="meta">
        更新時間: <b>${data.updated_at}</b><br>
        預測週期: <b>未來 ${data.pred_hours} 小時</b> · K線: <b>${data.interval}</b>
      </div>
    </header>

    <div class="summary-bar">
      <div class="sum-item">
        <div class="sum-label">買入</div>
        <div class="sum-value buy">${buy}</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">賣出</div>
        <div class="sum-value sell">${sell}</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">觀望</div>
        <div class="sum-value hold">${hold}</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">總數</div>
        <div class="sum-value">${data.stocks.length}</div>
      </div>
    </div>

    <div class="grid">${cards}</div>

    <div class="next-update">⚠️ 僅供參考，唔係投資建議 · 每30分鐘自動更新</div>
  `;

  // Draw sparklines after render
  requestAnimationFrame(() => {
    data.stocks.forEach(s => {
      const canvas = document.getElementById(`spark-${s.ticker}`);
      if (canvas) drawSparkline(canvas, s.history_spark, s.pred_spark);
    });
  });
}

async function loadData() {
  try {
    const res  = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('data.json not found');
    const data = await res.json();
    renderDashboard(data);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="error">
        <div>⚠️ 未能載入預測數據</div>
        <div style="margin-top:8px;color:#555570">請確保 GitHub Actions 已成功跑過一次</div>
        <br>
        <button class="refresh-btn" onclick="location.reload()">重新載入</button>
      </div>`;
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000); // Auto-refresh every 5 min
</script>
</body>
</html>
