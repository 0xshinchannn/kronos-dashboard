<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRONOS · NEXT 24H MARKET OUTLOOK</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #151515;
  --surface3: #1a1a1a;
  --border: #1e1e1e;
  --border2: #262626;
  --text: #e8e8e8;
  --muted: #555555;
  --dim: #333333;
  --buy: #00d68f;
  --buy-bg: rgba(0,214,143,0.08);
  --buy-border: rgba(0,214,143,0.25);
  --sell: #ff3b47;
  --sell-bg: rgba(255,59,71,0.08);
  --sell-border: rgba(255,59,71,0.25);
  --hold: #f5a623;
  --hold-bg: rgba(245,166,35,0.08);
  --hold-border: rgba(245,166,35,0.2);
  --accent: #ff6600;
  --blue: #4a9eff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--accent);
  padding: 5px 20px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; font-weight: 600; color: #000; letter-spacing: 0.08em;
}
.topbar-right { font-weight: 400; font-size: 9px; opacity: 0.75; }

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.logo {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 20px; font-weight: 700; letter-spacing: 0.12em; color: var(--text);
}
.logo span { color: var(--accent); }
.header-meta { display: flex; gap: 28px; align-items: center; }
.meta-item { text-align: right; }
.meta-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
.meta-value { font-size: 11px; color: var(--text); font-weight: 500; }

/* ── SUMMARY STRIP ── */
.summary-strip {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: stretch; gap: 0;
}
.sum-block {
  padding: 14px 28px 14px 0;
  margin-right: 28px;
  border-right: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.sum-block:last-child { border-right: none; margin-right: 0; }
.sum-block:hover { opacity: 0.75; }
.sum-num { font-size: 32px; font-weight: 600; line-height: 1; font-family: 'IBM Plex Sans', sans-serif; }
.sum-num.buy { color: var(--buy); }
.sum-num.sell { color: var(--sell); }
.sum-num.hold { color: var(--hold); }
.sum-num.total { color: var(--text); }
.sum-desc { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; line-height: 1.6; }
.sum-desc b { display: block; font-size: 9px; color: var(--dim); font-weight: 400; }

/* ── FILTER BAR ── */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex; align-items: center; gap: 0;
}
.filter-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em;
  padding: 12px 20px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--muted); cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  text-transform: uppercase;
}
.filter-btn:hover { color: var(--text); }
.filter-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.filter-btn.active.f-buy { color: var(--buy); border-bottom-color: var(--buy); }
.filter-btn.active.f-sell { color: var(--sell); border-bottom-color: var(--sell); }
.filter-btn.active.f-hold { color: var(--hold); border-bottom-color: var(--hold); }
.filter-count {
  display: inline-block;
  font-size: 9px; font-weight: 400;
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 1px 5px;
  margin-left: 5px;
  color: var(--muted);
}
.filter-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 12px;
}
.sort-label { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.sort-select {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--text);
  background: var(--surface3); border: 1px solid var(--border2);
  padding: 5px 10px; border-radius: 2px; cursor: pointer; outline: none;
}
.sort-select:focus { border-color: var(--accent); }

/* ── DISCLAIMER ── */
.disclaimer {
  background: #111000;
  border-bottom: 1px solid #1e1a00;
  padding: 7px 24px;
  font-size: 9px; color: #665f33; letter-spacing: 0.04em;
}
.disclaimer b { color: var(--hold); }

/* ── TABLE WRAPPER ── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}
thead tr {
  background: var(--surface2);
  border-bottom: 2px solid var(--border2);
}
thead th {
  padding: 10px 16px;
  text-align: left;
  font-size: 9px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
  white-space: nowrap;
  cursor: pointer; user-select: none;
}
thead th:hover { color: var(--text); }
thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }
thead th:first-child { width: 160px; }
thead th.col-signal { width: 90px; text-align: center; }
thead th.col-spark { width: 160px; }
thead th.col-num { text-align: right; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  cursor: default;
}
tbody tr:hover { background: var(--surface2); }

/* Signal-tinted row highlight */
tbody tr.row-BUY  { border-left: 2px solid rgba(0,214,143,0.4); }
tbody tr.row-SELL { border-left: 2px solid rgba(255,59,71,0.4); }
tbody tr.row-HOLD { border-left: 2px solid rgba(245,166,35,0.3); }

td { padding: 0 16px; height: 56px; vertical-align: middle; white-space: nowrap; }

/* Ticker cell */
.td-ticker { display: flex; flex-direction: column; gap: 2px; }
.t-sym { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.04em; }
.t-name { font-size: 9px; color: var(--muted); }

/* Signal badge */
.sig { display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; padding: 3px 10px; border-radius: 2px; min-width: 56px; }
.sig.BUY  { background: var(--buy-bg);  color: var(--buy);  border: 1px solid var(--buy-border); }
.sig.SELL { background: var(--sell-bg); color: var(--sell); border: 1px solid var(--sell-border); }
.sig.HOLD { background: var(--hold-bg); color: var(--hold); border: 1px solid var(--hold-border); }
td.col-signal { text-align: center; }

/* Number cells */
td.col-num { text-align: right; }
.price-cur { font-size: 13px; font-weight: 500; color: var(--text); }
.price-pred { font-size: 13px; font-weight: 500; color: var(--blue); }
.chg { font-size: 12px; font-weight: 600; }
.chg.pos { color: var(--buy); }
.chg.neg { color: var(--sell); }
.chg.neu { color: var(--hold); }

/* Range column */
.range-cell { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
.range-prices { display: flex; justify-content: space-between; font-size: 9px; }
.rl { color: var(--sell); } .rh { color: var(--buy); }
.range-track { height: 3px; background: var(--border2); border-radius: 2px; position: relative; }
.range-fill { position: absolute; height: 100%; background: var(--blue); border-radius: 2px; }
.range-dot { position: absolute; width: 7px; height: 7px; border-radius: 50%; background: var(--text); top: -2px; transform: translateX(-50%); border: 1px solid var(--bg); }

/* Sparkline column */
canvas.spark { display: block; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 11px; letter-spacing: 0.05em;
}
.empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }

/* ── FOOTER ── */
.footer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 12px 24px; font-size: 9px; color: var(--muted);
  display: flex; justify-content: space-between; align-items: center;
  letter-spacing: 0.04em;
}

/* ── LOADING / ERROR ── */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 60vh; gap: 14px; color: var(--muted); font-size: 11px; letter-spacing: 0.05em;
}
.spinner { width: 28px; height: 28px; border: 1px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { text-align: center; padding: 80px 40px; color: var(--sell); font-size: 12px; letter-spacing: 0.05em; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .col-spark, .col-range { display: none; }
  td:has(canvas.spark) { display: none; }
}
@media (max-width: 640px) {
  .header-meta { display: none; }
  .filter-right { display: none; }
  td, th { padding: 0 10px; }
}
</style>
</head>
<body>

<div class="topbar">
  <span>KRONOS · NEXT 24H MARKET OUTLOOK — AI-POWERED PRICE FORECAST</span>
  <span class="topbar-right">⚠ FOR INFORMATIONAL PURPOSES ONLY · NOT FINANCIAL ADVICE</span>
</div>

<div id="app">
  <div class="loading"><div class="spinner"></div><span>FETCHING MARKET DATA...</span></div>
</div>

<script>
const TICKER_NAMES = {
  AAPL:'Apple Inc.', NVDA:'NVIDIA Corp.', TSLA:'Tesla Inc.',
  COIN:'Coinbase Global', AMD:'Advanced Micro Devices', PYPL:'PayPal Holdings',
  MSTR:'MicroStrategy', GOOGL:'Alphabet Inc.', AMZN:'Amazon.com Inc.',
  SPY:'S&P 500 ETF', META:'Meta Platforms', MSFT:'Microsoft Corp.',
  QQQ:'Nasdaq 100 ETF', SLV:'Silver ETF', TSM:'Taiwan Semiconductor',
  MU:'Micron Technology', NFLX:'Netflix Inc.', BABA:'Alibaba Group', ABNB:'Airbnb Inc.'
};

let currentFilter = 'ALL';
let currentSort = { col: 'change_pct', dir: 'desc' };
let globalData = null;

function drawSparkline(canvas, hist, pred) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 140, H = canvas.offsetHeight || 40;
  canvas.width = W * dpr; canvas.height = H * dpr; ctx.scale(dpr, dpr);
  const all = [...hist, ...pred];
  const mn = Math.min(...all), mx = Math.max(...all), rng = mx - mn || 1;
  const pad = 3, total = hist.length + pred.length;
  const tx = i => pad + (i / (total - 1)) * (W - pad * 2);
  const ty = v => pad + (1 - (v - mn) / rng) * (H - pad * 2);

  // History line
  ctx.beginPath();
  hist.forEach((v, i) => i === 0 ? ctx.moveTo(tx(i), ty(v)) : ctx.lineTo(tx(i), ty(v)));
  ctx.strokeStyle = 'rgba(140,140,155,0.55)'; ctx.lineWidth = 1; ctx.stroke();

  // Divider
  const dx = tx(hist.length - 1);
  ctx.beginPath(); ctx.moveTo(dx, 0); ctx.lineTo(dx, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
  ctx.setLineDash([2, 3]); ctx.stroke(); ctx.setLineDash([]);

  // Prediction line + fill
  const up = pred[pred.length - 1] >= hist[hist.length - 1];
  const pc = up ? '#00d68f' : '#ff3b47';
  ctx.beginPath();
  ctx.moveTo(tx(hist.length - 1), ty(hist[hist.length - 1]));
  pred.forEach((v, i) => ctx.lineTo(tx(hist.length + i), ty(v)));
  ctx.strokeStyle = pc; ctx.lineWidth = 1.6; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(tx(hist.length - 1), ty(hist[hist.length - 1]));
  pred.forEach((v, i) => ctx.lineTo(tx(hist.length + i), ty(v)));
  ctx.lineTo(tx(total - 1), H); ctx.lineTo(tx(hist.length - 1), H); ctx.closePath();
  ctx.fillStyle = up ? 'rgba(0,214,143,0.07)' : 'rgba(255,59,71,0.07)'; ctx.fill();
}

function pct(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }
function cls(s) { return s === 'BUY' ? 'pos' : s === 'SELL' ? 'neg' : 'neu'; }

function rangeBar(low, high, cur) {
  const pos = Math.min(Math.max((cur - low) / ((high - low) || 1) * 100, 0), 100);
  return `<div class="range-cell">
    <div class="range-prices"><span class="rl">▼ $${low.toFixed(2)}</span><span class="rh">▲ $${high.toFixed(2)}</span></div>
    <div class="range-track">
      <div class="range-fill" style="left:0;width:${pos}%"></div>
      <div class="range-dot" style="left:${pos}%"></div>
    </div>
  </div>`;
}

function sortData(stocks) {
  const { col, dir } = currentSort;
  return [...stocks].sort((a, b) => {
    let av = a[col], bv = b[col];
    if (col === 'signal') {
      const ord = { BUY: 0, SELL: 1, HOLD: 2 };
      av = ord[av] ?? 3; bv = ord[bv] ?? 3;
    }
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    const cmp = av < bv ? -1 : av > bv ? 1 : 0;
    return dir === 'asc' ? cmp : -cmp;
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === f);
  });
  refreshTable();
}

function setSort(col) {
  if (currentSort.col === col) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort = { col, dir: col === 'ticker' ? 'asc' : 'desc' };
  }
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === col) th.classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
  });
  refreshTable();
}

function refreshTable() {
  if (!globalData) return;
  const stocks = globalData.stocks;
  const filtered = currentFilter === 'ALL' ? stocks : stocks.filter(s => s.signal === currentFilter);
  const sorted = sortData(filtered);

  // Update filter counts
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const f = btn.dataset.filter;
    const cnt = btn.querySelector('.filter-count');
    if (!cnt) return;
    if (f === 'ALL') cnt.textContent = stocks.length;
    else cnt.textContent = stocks.filter(s => s.signal === f).length;
  });

  const tbody = document.getElementById('tbody');
  if (!tbody) return;

  if (sorted.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">◎</div>No ${currentFilter} signals right now</div></td></tr>`;
    return;
  }

  tbody.innerHTML = sorted.map(s => `
    <tr class="row-${s.signal}">
      <td><div class="td-ticker"><span class="t-sym">${s.ticker}</span><span class="t-name">${TICKER_NAMES[s.ticker] || ''}</span></div></td>
      <td class="col-signal"><span class="sig ${s.signal}">${s.signal}</span></td>
      <td class="col-num"><span class="price-cur">$${s.current.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</span></td>
      <td class="col-num"><span class="price-pred">$${s.predicted.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2})}</span></td>
      <td class="col-num"><span class="chg ${cls(s.signal)}">${pct(s.change_pct)}</span></td>
      <td class="col-range">${rangeBar(s.pred_low, s.pred_high, s.current)}</td>
      <td class="col-spark"><canvas class="spark" id="sp-${s.ticker}" width="140" height="40"></canvas></td>
    </tr>`).join('');

  requestAnimationFrame(() => {
    sorted.forEach(s => {
      const c = document.getElementById(`sp-${s.ticker}`);
      if (c) drawSparkline(c, s.history_spark, s.pred_spark);
    });
  });
}

function renderShell(data) {
  const buy  = data.stocks.filter(s => s.signal === 'BUY').length;
  const sell = data.stocks.filter(s => s.signal === 'SELL').length;
  const hold = data.stocks.filter(s => s.signal === 'HOLD').length;

  document.getElementById('app').innerHTML = `
    <header>
      <div class="logo">KRONOS <span>·</span> NEXT 24H MARKET OUTLOOK</div>
      <div class="header-meta">
        <div class="meta-item"><div class="meta-label">Last Updated</div><div class="meta-value">${data.updated_at}</div></div>
        <div class="meta-item"><div class="meta-label">Forecast Window</div><div class="meta-value">+${data.pred_hours}H · ${data.interval.toUpperCase()} BARS</div></div>
        <div class="meta-item"><div class="meta-label">Auto Refresh</div><div class="meta-value">EVERY 30 MIN</div></div>
      </div>
    </header>

    <div class="summary-strip">
      <div class="sum-block" onclick="setFilter('BUY')" title="Show BUY signals">
        <div class="sum-num buy">${buy}</div>
        <div class="sum-desc">BUY <b>SIGNAL</b></div>
      </div>
      <div class="sum-block" onclick="setFilter('SELL')" title="Show SELL signals">
        <div class="sum-num sell">${sell}</div>
        <div class="sum-desc">SELL <b>SIGNAL</b></div>
      </div>
      <div class="sum-block" onclick="setFilter('HOLD')" title="Show HOLD signals">
        <div class="sum-num hold">${hold}</div>
        <div class="sum-desc">HOLD <b>SIGNAL</b></div>
      </div>
      <div class="sum-block" onclick="setFilter('ALL')" title="Show all">
        <div class="sum-num total">${data.stocks.length}</div>
        <div class="sum-desc">TOTAL <b>TRACKED</b></div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="ALL" onclick="setFilter('ALL')">All <span class="filter-count">${data.stocks.length}</span></button>
      <button class="filter-btn f-buy"  data-filter="BUY"  onclick="setFilter('BUY')">▲ Buy <span class="filter-count">${buy}</span></button>
      <button class="filter-btn f-sell" data-filter="SELL" onclick="setFilter('SELL')">▼ Sell <span class="filter-count">${sell}</span></button>
      <button class="filter-btn f-hold" data-filter="HOLD" onclick="setFilter('HOLD')">— Hold <span class="filter-count">${hold}</span></button>
      <div class="filter-right">
        <span class="sort-label">Sort</span>
        <select class="sort-select" onchange="handleSortSelect(this.value)">
          <option value="change_pct-desc">% Change ↓</option>
          <option value="change_pct-asc">% Change ↑</option>
          <option value="current-desc">Price ↓</option>
          <option value="current-asc">Price ↑</option>
          <option value="ticker-asc">Ticker A→Z</option>
          <option value="signal-asc">Signal</option>
        </select>
      </div>
    </div>

    <div class="disclaimer"><b>⚠ DISCLAIMER:</b> Predictions generated by Kronos AI model. For informational purposes only. Not financial advice. Always do your own research.</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="ticker" onclick="setSort('ticker')">Ticker</th>
            <th class="col-signal" data-col="signal" onclick="setSort('signal')">Signal</th>
            <th class="col-num" data-col="current" onclick="setSort('current')">Last Price</th>
            <th class="col-num" data-col="predicted" onclick="setSort('predicted')">24H Forecast</th>
            <th class="col-num sort-desc" data-col="change_pct" onclick="setSort('change_pct')">Change %</th>
            <th class="col-range">Forecast Range</th>
            <th class="col-spark">History + Forecast</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer">
      <span>POWERED BY KRONOS FOUNDATION MODEL · TRAINED ON 45+ GLOBAL EXCHANGES</span>
      <span>AUTO-REFRESHES EVERY 5 MIN · GITHUB ACTIONS RUNS EVERY 30 MIN</span>
    </div>`;
}

function handleSortSelect(val) {
  const [col, dir] = val.split('-');
  currentSort = { col, dir };
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === col) th.classList.add(dir === 'asc' ? 'sort-asc' : 'sort-desc');
  });
  refreshTable();
}

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (!data.stocks || data.stocks.length === 0) throw new Error();
    const firstLoad = !globalData;
    globalData = data;
    if (firstLoad) renderShell(data);
    refreshTable();
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="error-state"><div style="font-size:14px;margin-bottom:8px;">NO DATA AVAILABLE</div><div style="color:#555;font-size:11px;">Please trigger a manual run from the Actions tab.</div></div>';
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
