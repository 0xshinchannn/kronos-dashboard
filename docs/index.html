<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRONOS · NEXT 24H MARKET OUTLOOK</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c; --surface: #111111; --surface2: #161616;
  --border: #222222; --border2: #2a2a2a; --text: #e8e8e8;
  --muted: #666666; --dim: #444444; --buy: #00d68f;
  --sell: #ff3b47; --hold: #f5a623; --accent: #ff6600; --blue: #4a9eff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; min-height: 100vh; }
.topbar { background: var(--accent); padding: 4px 20px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 600; color: #000; letter-spacing: 0.08em; }
.topbar-right { font-weight: 400; font-size: 10px; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.logo { font-family: 'IBM Plex Sans', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.15em; color: var(--text); }
.logo span { color: var(--accent); }
.header-meta { display: flex; gap: 24px; align-items: center; }
.meta-item { text-align: right; }
.meta-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
.meta-value { font-size: 12px; color: var(--text); font-weight: 500; }
.summary-strip { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: stretch; }
.sum-block { padding: 12px 24px 12px 0; margin-right: 24px; border-right: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.sum-block:last-child { border-right: none; }
.sum-num { font-size: 28px; font-weight: 600; line-height: 1; }
.sum-num.buy { color: var(--buy); } .sum-num.sell { color: var(--sell); } .sum-num.hold { color: var(--hold); } .sum-num.total { color: var(--text); }
.sum-desc { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; line-height: 1.5; }
.sum-desc b { display: block; font-size: 9px; color: var(--dim); font-weight: 400; }
.disclaimer { background: #1a1400; border-bottom: 1px solid #2a2000; padding: 7px 20px; font-size: 10px; color: #888855; letter-spacing: 0.03em; }
.disclaimer b { color: var(--hold); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1px; background: var(--border); }
.card { background: var(--surface); transition: background 0.1s; }
.card:hover { background: #141414; }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 10px; border-bottom: 1px solid var(--border); }
.ticker-block { display: flex; align-items: baseline; gap: 8px; }
.ticker { font-family: 'IBM Plex Sans', sans-serif; font-size: 17px; font-weight: 600; letter-spacing: 0.05em; color: var(--text); }
.ticker-name { font-size: 10px; color: var(--muted); letter-spacing: 0.03em; }
.signal-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; padding: 3px 8px; border-radius: 2px; }
.signal-badge.BUY  { background: rgba(0,214,143,0.12); color: var(--buy);  border: 1px solid rgba(0,214,143,0.3); }
.signal-badge.SELL { background: rgba(255,59,71,0.12);  color: var(--sell); border: 1px solid rgba(255,59,71,0.3); }
.signal-badge.HOLD { background: rgba(245,166,35,0.12); color: var(--hold); border: 1px solid rgba(245,166,35,0.3); }
.price-section { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); }
.price-main-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
.price-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
.price-current { font-size: 26px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); }
.price-change { font-size: 13px; font-weight: 500; }
.price-change.pos { color: var(--buy); } .price-change.neg { color: var(--sell); } .price-change.neu { color: var(--hold); }
.pred-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.pred-label { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.pred-price { font-size: 18px; font-weight: 500; color: var(--blue); }
.pred-horizon { font-size: 9px; color: var(--muted); margin-left: auto; letter-spacing: 0.05em; }
.range-section { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.range-label-row { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.range-bar-wrap { height: 4px; background: var(--border2); border-radius: 2px; position: relative; margin-bottom: 6px; }
.range-bar-fill { position: absolute; height: 100%; border-radius: 2px; background: var(--blue); }
.range-bar-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; background: var(--text); top: -2px; transform: translateX(-50%); border: 1px solid var(--bg); }
.range-vals { display: flex; justify-content: space-between; font-size: 11px; }
.range-low { color: var(--sell); } .range-high { color: var(--buy); }
.spark-section { padding: 10px 16px 14px; }
.spark-label { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; }
.spark-legend { display: flex; gap: 12px; }
.spark-legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--muted); }
.spark-dot { width: 6px; height: 2px; border-radius: 1px; }
canvas.spark { width: 100%; height: 52px; display: block; }
.footer { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 14px; color: var(--muted); font-size: 12px; letter-spacing: 0.05em; }
.spinner { width: 28px; height: 28px; border: 1px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { text-align: center; padding: 80px 40px; color: var(--sell); font-size: 12px; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="topbar">
  <span>KRONOS · NEXT 24H MARKET OUTLOOK — AI-POWERED PRICE FORECAST</span>
  <span class="topbar-right">⚠ FOR INFORMATIONAL PURPOSES ONLY · NOT FINANCIAL ADVICE</span>
</div>
<div id="app"><div class="loading"><div class="spinner"></div><span>FETCHING MARKET DATA...</span></div></div>
<script>
const TICKER_NAMES = {
  AAPL:'Apple Inc.', NVDA:'NVIDIA Corp.', TSLA:'Tesla Inc.',
  COIN:'Coinbase Global', AMD:'Advanced Micro Devices', PYPL:'PayPal Holdings',
  MSTR:'MicroStrategy', GOOGL:'Alphabet Inc.', AMZN:'Amazon.com Inc.',
  SPY:'S&P 500 ETF', META:'Meta Platforms'
};
function drawSparkline(canvas, hist, pred) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W * dpr; canvas.height = H * dpr; ctx.scale(dpr, dpr);
  const all = [...hist, ...pred], mn = Math.min(...all), mx = Math.max(...all), rng = mx - mn || 1, pad = 4, total = hist.length + pred.length;
  const tx = i => pad + (i / (total-1)) * (W - pad*2);
  const ty = v => pad + (1 - (v-mn)/rng) * (H - pad*2);
  ctx.beginPath(); hist.forEach((v,i) => i===0 ? ctx.moveTo(tx(i),ty(v)) : ctx.lineTo(tx(i),ty(v)));
  ctx.strokeStyle='rgba(150,150,160,0.6)'; ctx.lineWidth=1.2; ctx.stroke();
  const dx=tx(hist.length-1); ctx.beginPath(); ctx.moveTo(dx,2); ctx.lineTo(dx,H-2);
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1; ctx.setLineDash([2,3]); ctx.stroke(); ctx.setLineDash([]);
  const up=pred[pred.length-1]>=hist[hist.length-1], pc=up?'#00d68f':'#ff3b47';
  ctx.beginPath(); ctx.moveTo(tx(hist.length-1),ty(hist[hist.length-1]));
  pred.forEach((v,i) => ctx.lineTo(tx(hist.length+i),ty(v)));
  ctx.strokeStyle=pc; ctx.lineWidth=1.8; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx(hist.length-1),ty(hist[hist.length-1]));
  pred.forEach((v,i) => ctx.lineTo(tx(hist.length+i),ty(v)));
  ctx.lineTo(tx(total-1),H); ctx.lineTo(tx(hist.length-1),H); ctx.closePath();
  ctx.fillStyle=up?'rgba(0,214,143,0.06)':'rgba(255,59,71,0.06)'; ctx.fill();
}
function pct(v) { return (v>=0?'+':'')+v.toFixed(2)+'%'; }
function cls(s) { return s==='BUY'?'pos':s==='SELL'?'neg':'neu'; }
function rangeBar(low,high,cur) {
  const pos=Math.min(Math.max((cur-low)/(high-low||1)*100,0),100);
  return `<div class="range-bar-wrap"><div class="range-bar-fill" style="left:0;width:${pos}%"></div><div class="range-bar-dot" style="left:${pos}%"></div></div>`;
}
function renderDashboard(data) {
  const buy=data.stocks.filter(s=>s.signal==='BUY').length;
  const sell=data.stocks.filter(s=>s.signal==='SELL').length;
  const hold=data.stocks.filter(s=>s.signal==='HOLD').length;
  const cards=data.stocks.map(s=>`
    <div class="card">
      <div class="card-header">
        <div class="ticker-block"><div class="ticker">${s.ticker}</div><div class="ticker-name">${TICKER_NAMES[s.ticker]||''}</div></div>
        <div class="signal-badge ${s.signal}">${s.signal}</div>
      </div>
      <div class="price-section">
        <div class="price-label">LAST PRICE</div>
        <div class="price-main-row"><div class="price-current">$${s.current.toFixed(2)}</div><div class="price-change ${cls(s.signal)}">${pct(s.change_pct)}</div></div>
        <div class="pred-row">
          <div><div class="pred-label">24H FORECAST</div><div class="pred-price">$${s.predicted.toFixed(2)}</div></div>
          <div class="pred-horizon">NEXT ${data.pred_hours}H · ${data.interval.toUpperCase()} BAR</div>
        </div>
      </div>
      <div class="range-section">
        <div class="range-label-row"><span>FORECAST RANGE</span><span>LOW → HIGH</span></div>
        ${rangeBar(s.pred_low,s.pred_high,s.current)}
        <div class="range-vals"><span class="range-low">▼ $${s.pred_low.toFixed(2)}</span><span style="font-size:10px;color:var(--dim)">current: $${s.current.toFixed(2)}</span><span class="range-high">▲ $${s.pred_high.toFixed(2)}</span></div>
      </div>
      <div class="spark-section">
        <div class="spark-label"><span>PRICE HISTORY + FORECAST</span>
          <div class="spark-legend">
            <div class="spark-legend-item"><div class="spark-dot" style="background:rgba(150,150,160,0.6)"></div>HIST</div>
            <div class="spark-legend-item"><div class="spark-dot" style="background:${s.signal==='SELL'?'#ff3b47':'#00d68f'}"></div>PRED</div>
          </div>
        </div>
        <canvas class="spark" id="sp-${s.ticker}" height="52"></canvas>
      </div>
    </div>`).join('');
  document.getElementById('app').innerHTML=`
    <header>
      <div class="logo">KRONOS <span>·</span> NEXT 24H MARKET OUTLOOK</div>
      <div class="header-meta">
        <div class="meta-item"><div class="meta-label">Last Updated</div><div class="meta-value">${data.updated_at}</div></div>
        <div class="meta-item"><div class="meta-label">Forecast Window</div><div class="meta-value">+${data.pred_hours}H · ${data.interval.toUpperCase()} BARS</div></div>
        <div class="meta-item"><div class="meta-label">Auto Refresh</div><div class="meta-value">EVERY 30 MIN</div></div>
      </div>
    </header>
    <div class="summary-strip">
      <div class="sum-block"><div class="sum-num buy">${buy}</div><div class="sum-desc">BUY <b>SIGNAL</b></div></div>
      <div class="sum-block"><div class="sum-num sell">${sell}</div><div class="sum-desc">SELL <b>SIGNAL</b></div></div>
      <div class="sum-block"><div class="sum-num hold">${hold}</div><div class="sum-desc">HOLD <b>SIGNAL</b></div></div>
      <div class="sum-block"><div class="sum-num total">${data.stocks.length}</div><div class="sum-desc">TOTAL <b>TRACKED</b></div></div>
    </div>
    <div class="disclaimer"><b>⚠ DISCLAIMER:</b> Predictions generated by Kronos AI model. Not financial advice. Always do your own research.</div>
    <div class="grid">${cards}</div>
    <div class="footer"><span>POWERED BY KRONOS FOUNDATION MODEL · TRAINED ON 45+ GLOBAL EXCHANGES</span><span>AUTO-REFRESHES EVERY 5 MIN · GITHUB ACTIONS RUNS EVERY 30 MIN</span></div>`;
  requestAnimationFrame(()=>{ data.stocks.forEach(s=>{ const c=document.getElementById(`sp-${s.ticker}`); if(c) drawSparkline(c,s.history_spark,s.pred_spark); }); });
}
async function loadData() {
  try {
    const res=await fetch('data.json?t='+Date.now());
    if(!res.ok) throw new Error();
    const data=await res.json();
    if(!data.stocks||data.stocks.length===0) throw new Error();
    renderDashboard(data);
  } catch(e) {
    document.getElementById('app').innerHTML='<div class="error-state"><div style="font-size:14px;margin-bottom:8px;">NO DATA AVAILABLE</div><div style="color:#555;font-size:11px;">Please trigger a manual run from the Actions tab.</div></div>';
  }
}
loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
